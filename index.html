<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bussiness Result Card</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <main>
        <section class="lsec">
           <h4>Your Result</h4>
            <div class="cicle">
                <h1>76</h1>
                <span>of 100</span>
            </div>
            <h2>Great</h2>
            <span>You scored higher than 65% of the people who have taken these tests.</span>
        </section>

        <section class="rsec">
            <h3>Summary</h3>
            <article>
                <section class="rbox">
                    <img src="assets/images/icon1.png" alt="R">
                    <span class="r">Reaction</span>
                    <p><b>80</b> / 100</p>
                </section>
                <section class="ybox">
                    <img src="assets/images/icon3.png" alt="M">
                    <span class="y">Memory</span>
                    <p><b>92</b> / 100</p>
                </section>
                <section class="gbox">
                    <img src="assets/images/icon2.png" alt="V">
                    <span class="g">Verbal</span>
                    <p><b>61</b> / 100</p>
                </section>
                <section class="bbox">
                    <img src="assets/images/icon4.png" alt="V">
                    <span class="b">Visual</span>
                    <p><b>73</b> / 100</p>
                </section>
                <button>Continue</button>
            </article>
        </section>
    </main>
</body>
</html>
